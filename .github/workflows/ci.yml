# CI workflow - runs the same commands as local development
#
# Uses `just ci` to ensure parity between local and CI environments.
# If CI fails, run `just ci` locally to reproduce the issue.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      # Run the exact same command as local development
      - name: Run CI pipeline
        run: just ci

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: pretender-linux-amd64
          path: target/release/pretender

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run coverage (threshold from .tarpaulin.toml)
        run: cargo tarpaulin

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/coverage/cobertura.xml
          fail_ci_if_error: false
