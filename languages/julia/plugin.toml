name         = "julia"
display_name = "Julia"
extensions   = [".jl"]
shebangs     = ["julia"]
tree_sitter  = { source = "builtin:tree-sitter-julia", rev = "0.23" }
query        = "metrics.scm"

[branches]
"@branch.if"           = { cyclomatic = 1, cognitive = 1 }
"@branch.elif"         = { cyclomatic = 1, cognitive = 1 }
"@branch.loop"         = { cyclomatic = 1, cognitive = 1 }
"@branch.catch"        = { cyclomatic = 1, cognitive = 1 }
"@branch.ternary"       = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.and"  = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.or"   = { cyclomatic = 1, cognitive = 1 }

[assertions]
patterns = [
  "^@test",
  "^@test_",
  "^@inferred",
  "^@test_logs",
  "^@test_throws",
  "^@test_deprecated",
  "^@test_nowarn",
  "^@test_warn",
  "^@test_skip",
  "^Test\\.test_",
]

[smell_weights]
"eval"  = 5.0
"Meta.parse" = 4.0
"include" = 2.0
"ccall" = 3.0