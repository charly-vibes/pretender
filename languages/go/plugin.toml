name         = "go"
display_name = "Go"
extensions   = [".go"]
shebangs     = []
tree_sitter  = { source = "builtin:tree-sitter-go", rev = "0.23" }
query        = "metrics.scm"

[branches]
"@branch.if"           = { cyclomatic = 1, cognitive = 1 }
"@branch.loop"         = { cyclomatic = 1, cognitive = 1 }
"@branch.case"         = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.and"  = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.or"   = { cyclomatic = 1, cognitive = 1 }

[assertions]
patterns = [
  "^assert",
  "^require",
  "^t\\.Error",
  "^t\\.Fatal",
  "^t\\.Fail",
]

[smell_weights]
"unsafe"  = 4.0
"reflect" = 2.0
"init"    = 1.5
