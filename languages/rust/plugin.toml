name         = "rust"
display_name = "Rust"
extensions   = [".rs"]
shebangs     = []
tree_sitter  = { source = "builtin:tree-sitter-rust", rev = "0.23" }
query        = "metrics.scm"

[branches]
"@branch.if"           = { cyclomatic = 1, cognitive = 1 }
"@branch.loop"         = { cyclomatic = 1, cognitive = 1 }
"@branch.match_arm"    = { cyclomatic = 1, cognitive = 1 }

[assertions]
patterns = [
  "^assert$",
  "^assert_eq$",
  "^assert_ne$",
  "^panic$",
]

[smell_weights]
"unsafe"              = 4.0
"std::mem::transmute" = 5.0
"macro_rules!"        = 1.5
