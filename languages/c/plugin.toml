name         = "c"
display_name = "C"
extensions   = [".c", ".h"]
shebangs     = []
tree_sitter  = { source = "builtin:tree-sitter-c", rev = "0.23" }
query        = "metrics.scm"

[branches]
"@branch.if"           = { cyclomatic = 1, cognitive = 1 }
"@branch.loop"         = { cyclomatic = 1, cognitive = 1 }
"@branch.case"         = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.and"  = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.or"   = { cyclomatic = 1, cognitive = 1 }

[assertions]
patterns = [
  "^assert",
  "^ASSERT",
  "^TEST_ASSERT",
]

[smell_weights]
"goto"   = 3.0
"malloc" = 1.5
"free"   = 1.5
