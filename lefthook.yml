pre-commit:
  parallel: true
  commands:
    type-check:
      run: just type-check
    lint:
      run: just lint

pre-push:
  parallel: true
  commands:
    fmt:
      run: just fmt-check
    lint:
      run: just lint
    test:
      # Run only affected tests via testaruda (falls back to full cargo test)
      run: testaruda-pre-push
