name         = "java"
display_name = "Java"
extensions   = [".java"]
shebangs     = []
tree_sitter  = { source = "builtin:tree-sitter-java", rev = "0.23" }
query        = "metrics.scm"

[branches]
"@branch.if"           = { cyclomatic = 1, cognitive = 1 }
"@branch.loop"         = { cyclomatic = 1, cognitive = 1 }
"@branch.catch"        = { cyclomatic = 1, cognitive = 1 }
"@branch.ternary"      = { cyclomatic = 1, cognitive = 1 }
"@branch.case"         = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.and"  = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.or"   = { cyclomatic = 1, cognitive = 1 }

[assertions]
patterns = [
  "^assert",
  "^Assert",
  "^verify",
  "^Verify",
  "^expect",
  "^fail",
]

[smell_weights]
"instanceof"   = 1.5
"synchronized" = 2.0
"Thread"       = 2.0
