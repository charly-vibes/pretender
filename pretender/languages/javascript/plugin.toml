name         = "javascript"
display_name = "JavaScript"
extensions   = [".js", ".jsx", ".mjs", ".cjs"]
shebangs     = ["node"]
tree_sitter  = { source = "builtin:tree-sitter-javascript", rev = "0.23" }
query        = "metrics.scm"

[branches]
"@branch.if"           = { cyclomatic = 1, cognitive = 1 }
"@branch.loop"         = { cyclomatic = 1, cognitive = 1 }
"@branch.catch"        = { cyclomatic = 1, cognitive = 1 }
"@branch.ternary"      = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.and"  = { cyclomatic = 1, cognitive = 1 }
"@branch.logical.or"   = { cyclomatic = 1, cognitive = 1 }

[assertions]
patterns = [
  "^assert$",
  "^assert[A-Z]",
  "^expect$",
  "^it$",
  "^test$",
  "^describe$",
]

[smell_weights]
"eval"     = 5.0
"Function" = 4.0
